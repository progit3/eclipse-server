- type: entity
  parent: [ CrateAshLegion, StorePresetUplink, BaseLegionContraband ]
  id: CrateAshLegionSurplusBundle
  name: Legion surplus crate
  description: Contains 50 telecrystals worth of completely random Legion items. It can be useless junk or really good.
  components:
    - type: SurplusBundle
      totalPrice: 50

- type: entity
  parent: CrateAshLegion
  id: CrateCybersunJuggernautBundle
  name: Cybersun juggernaut bundle
  suffix: Filled
  description: Contains everything except a big gun to go postal.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingOuterHardsuitJuggernaut
        - !type:NestedSelector
          tableId: LegionHardsuitExtrasEntityTable

- type: entity
  parent: [ CrateAshLegion, StorePresetUplink, BaseLegionContraband ]
  id: CrateAshLegionSuperSurplusBundle
  name: Legion super surplus crate
  description: Contains 125 telecrystals worth of completely random Legion items.
  components:
    - type: SurplusBundle
      totalPrice: 125
