  suffix: Basic ship gear, Random, Chameleon Kit
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FilLockerLegionShipGearBasicChameleonKit

- type: entityTable
  id: FilLockerLegionShipGearBasicChameleonKit
  table: !type:AllSelector
    children:
