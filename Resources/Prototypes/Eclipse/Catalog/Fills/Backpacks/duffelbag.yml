        amount: 4
      - id: Tourniquet
        amount: 4
      - id: CombatMedipen
        amount: 4
      - id: PunctAutoInjector
        amount: 4
      - id: PyraAutoInjector
        amount: 4
      - id: AirlossAutoInjector
        amount: 4

