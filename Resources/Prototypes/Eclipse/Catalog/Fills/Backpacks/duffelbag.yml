    contents:
      - id: SyringeRomerol
      - id: WeaponRevolverPython
      - id: MagazineBoxMagnumIncendiary
      - id: PillAmbuzolPlus
      - id: PillAmbuzol
        amount: 3

- type: entity
  parent: ClothingBackpackDuffelAshLegionMedical
