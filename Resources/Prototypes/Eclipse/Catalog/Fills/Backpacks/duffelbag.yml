        children:
        - id: WeaponSubMachineGunAshLegionSMG
        - id: MagazinePistolSubMachineGun
          amount: 3
        - id: MagazinePistol
        - id: AshLegionJawsOfLife
        - id: C4
          amount: 2
        - id: MedkitCombatFilled
        - id: EmpImplanterAshLegion
        - id: ClothingShoesBootsMagAshLegion
        - id: AgentIDCard

