    sprite: Eclipse/Clothing/Belt/nanotarsen_navy_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: Eclipse/Clothing/Belt/nanotarsen_navy_sheath.rsi
  - type: Item
    size: Ginormous
