- type: entity
  parent: IDCardStandard
  id: CoSCCIDCard
  name: centcom chief of staff ID card
  components:
  - type: Sprite
    layers:
    - state: silver
    - state: stripe_top
      color: "#343b7e"
    - state: stripe_bottom
      color: "#343b7e"
