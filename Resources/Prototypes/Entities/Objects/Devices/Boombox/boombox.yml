  id: 1
  name: BoomBox
  description: Слушать музыку и бегать одновременно никто не запрещал.
  components:
    - type: Sprite
      sprite: _Backmen/Objects/Devices/boombox.rsi
      size: little
      state: "off"

      -type: Item
      onState: on
      offState: off
      selectState: select
