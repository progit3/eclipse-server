- type: entity
  parent: [BaseItem, BaseLegionContraband]
  abstract: true
  id: ReinforcementRadio
  name: legion reinforcement radio
  description: Call in a legion agent of questionable quality, instantly! Only basic equipment provided.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Devices/inteq_uplink.rsi
    layers:
    - state: ashlegion-uplink
  - type: UserInterface
    interfaces:
      enum.GhostRoleRadioUiKey.Key:
        type: GhostRoleRadioBoundUserInterface
  - type: ActivatableUI
    key: enum.GhostRoleRadioUiKey.Key

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioLegion
  name: legion reinforcement radio
  description: Call in a legion agent of questionable quality, instantly!
  components:
  - type: GhostRole
    name: ghost-role-information-legion-reinforcement-spy-name
    description: ghost-role-information-legion-reinforcement-spy-description
    rules: ghost-role-information-legion-reinforcement-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobHumanLegionAgentSpy
    selectablePrototypes: ["LegionAgentMedic", "LegionAgentSpy", "LegionAgentThief"]

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioLegionNukeops # Reinforcement radio exclusive to nukeops uplink
  name: nuclear operative radio
  description: Call in a nuclear operative of questionable quality, instantly! Basic nukeop equipment provided.
  suffix: NukeOps
  components:
  - type: GhostRole
    name: ghost-role-information-nukeop-reinforcement-name
    description: ghost-role-information-nukeop-reinforcement-description
    rules: ghost-role-information-nukeop-reinforcement-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobHumanLegionAgentNukeops

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioLegionAncestor
  name: legion genetic ancestor reinforcement radio
  description: Calls in a specially trained ancestor of your choosing to assist you.
  components:
  - type: GhostRole
    name: ghost-role-information-legion-monkey-reinforcement-name
    description: ghost-role-information-legion-monkey-reinforcement-description
    rules: ghost-role-information-legion-reinforcement-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobMonkeyLegionAgent
    selectablePrototypes: ["LegionMonkey", "LegionKobold"]

- type: entity
  parent: ReinforcementRadioLegionAncestor
  id: ReinforcementRadioLegionAncestorNukeops # Reinforcement radio exclusive to nukeops uplink
  suffix: NukeOps
  components:
  - type: GhostRole
    rules: ghost-role-information-nukeop-reinforcement-rules
  - type: GhostRoleMobSpawner
    prototype: MobMonkeyLegionAgentNukeops
    selectablePrototypes: ["LegionMonkeyNukeops", "LegionKoboldNukeops"]

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioLegionLegionCat
  name: legioncat reinforcement radio
  description: Calls in a faithfully trained cat with a microbomb to assist you.
  components:
  - type: GhostRole
    name: ghost-role-information-LegionCat-name
    description: ghost-role-information-LegionCat-description
    rules: ghost-role-information-legion-reinforcement-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: MobCatLegion
  - type: EmitSoundOnUse
    sound: /Audio/Animals/cat_meow.ogg

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioLegionCyborgAssault # Reinforcement radio exclusive to nukeops uplink
  name: legion assault cyborg reinforcement radio
  description: Call in a well armed assault cyborg, instantly!
  suffix: NukeOps
  components:
    - type: GhostRole
      name: ghost-role-information-legion-cyborg-assault-name
      description: ghost-role-information-legion-cyborg-description
      rules: ghost-role-information-silicon-rules
      mindRoles:
      - MindRoleGhostRoleSilicon
      raffle:
        settings: default
      job: Borg
    - type: GhostRoleMobSpawner
      prototype: PlayerBorgLegionAssaultBattery
