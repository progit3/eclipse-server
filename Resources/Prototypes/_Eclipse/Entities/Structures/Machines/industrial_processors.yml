- type: entity
  abstract: true
  parent: BaseMachinePowered
  id: BaseIndustrialProcessor
  description: Industrial ore processing equipment.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.6,-0.6,0.6,0.6"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    # TODO: Replace with dedicated _Eclipse/Structures/Machines/industrial_*.rsi sprites.
    sprite: Structures/Machines/ore_processor.rsi
    layers:
    - state: icon
      map: ["enum.IndustrialProcessorVisualLayers.Base"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Icon
    sprite: Structures/Machines/ore_processor.rsi
    state: icon
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.IndustrialProcessorVisuals.State:
        enum.IndustrialProcessorVisualLayers.Base:
          Idle: { state: icon }
          Working: { state: building }
          Blocked: { state: icon }
          Unpowered: { state: icon }
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: IndustrialProcessor
    inputContainerId: industrial_input
    outputContainerId: industrial_output
    autoStart: true
    canWorkWithoutPower: false
  - type: ContainerContainer
    containers:
      industrial_input: !type:Container
      industrial_output: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - industrial_input
    - industrial_output
  - type: GuideHelp
    guides:
    - Salvage

