# Basic tier machines

- type: entity
  parent: BasicTierIndustrialProcessor
  id: BasicIndustrialCrusher
  name: basic industrial crusher
  description: Grinds raw ore into crushed ore for further processing.
  components:
  - type: IndustrialProcessor
    processorType: Crusher
  - type: ApcPowerReceiver
    powerLoad: 2000

- type: entity
  parent: BasicTierIndustrialProcessor
  id: BasicIndustrialRoughCentrifuge
  name: basic rough centrifuge
  description: Separates heavy ore fractions from waste rock.
  components:
  - type: IndustrialProcessor
    processorType: RoughCentrifuge
  - type: ApcPowerReceiver
    powerLoad: 3000

- type: entity
  parent: BasicTierIndustrialProcessor
  id: BasicIndustrialOreWasher
  name: basic ore washer
  description: Cleans ore concentrate from sludge, dust and chemical contaminants.
  components:
  - type: IndustrialProcessor
    processorType: OreWasher
  - type: ApcPowerReceiver
    powerLoad: 2000

- type: entity
  parent: BasicTierIndustrialProcessor
  id: BasicIndustrialPrecisionCentrifuge
  name: basic precision centrifuge
  description: Separates cleaned concentrate into metallurgical fractions.
  components:
  - type: IndustrialProcessor
    processorType: PrecisionCentrifuge
  - type: ApcPowerReceiver
    powerLoad: 4000

- type: entity
  parent: BasicTierIndustrialProcessor
  id: BasicIndustrialSmelter
  name: basic industrial smelter
  description: Smelts metallurgical fractions into industrial billets.
  components:
  - type: IndustrialProcessor
    processorType: Smelter
  - type: ApcPowerReceiver
    powerLoad: 5000

