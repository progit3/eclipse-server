# Industrial ore processing intermediate items and byproducts.
# TODO: Byproducts will feed a future waste recycler / chemistry department.

- type: entity
  abstract: true
  parent: BaseItem
  id: IndustrialMaterialBase
  description: An industrial processing material.
  components:
  - type: Sprite
    sprite: Objects/Materials/ingots.rsi
  - type: Item
    sprite: Objects/Materials/ingots.rsi
    size: Normal
  - type: Tag
    tags:
    - IndustrialIntermediate
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2

- type: entity
  parent: OreBase
  id: CopperOre
  name: copper ore
  suffix: Full
  components:
  - type: Stack
    stackType: CopperOre
  - type: Sprite
    state: iron
    # TODO: Add dedicated copper ore sprite to ore.rsi
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      RawIron: 100
    # TODO: Add RawCopper material when copper material chain is added.
  - type: Item
    heldPrefix: iron
  - type: Tag
    tags:
    - Ore

- type: entity
  parent: CopperOre
  id: CopperOre1
  suffix: Single
  components:
  - type: Stack
    count: 1

