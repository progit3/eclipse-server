# Industrial ore processing recipes.
# Uses existing SS14 ore IDs: SteelOre (iron), SpaceQuartz (quartz).

# Iron chain
- type: industrialRecipe
  id: CrushIronOre
  processor: Crusher
  time: 4.5
  inputs:
    SteelOre: 1
  outputs:
    CrushedIronOre: 1
    StoneDust: 1

- type: industrialRecipe
  id: RoughCentrifugeCrushedIronOre
  processor: RoughCentrifuge
  time: 6
  inputs:
    CrushedIronOre: 1
  outputs:
    IronConcentrate: 1
    WasteRock: 1

- type: industrialRecipe
  id: WashIronConcentrate
  processor: OreWasher
  time: 5
  inputs:
    IronConcentrate: 1
  outputs:
    CleanIronConcentrate: 1
    DirtySludge: 1

- type: industrialRecipe
  id: PrecisionCentrifugeCleanIronConcentrate
  processor: PrecisionCentrifuge
  time: 7
  inputs:
    CleanIronConcentrate: 1
  outputs:
    IronMetallurgicFraction: 1
    MineralResidue: 1

- type: industrialRecipe
  id: SmeltIronFraction
  processor: Smelter
  time: 8
  inputs:
    IronMetallurgicFraction: 1
  outputs:
    IndustrialSteelBillet: 1
    MetalDust: 1

