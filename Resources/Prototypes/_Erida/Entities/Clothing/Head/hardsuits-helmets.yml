#NANOTRASEN NAVY HARDSUITS
#NT Navy Captain Hardsuit
- type: entity
  parent: [ BaseCentcommContraband, ClothingHeadHelmetHardsuitSyndieCommander ]
  id: ClothingHeadHelmetHardsuitNTNavyCaptain
  name: nanotrasen navy captain hardsuit helmet
  description: A reinforced pressure helmet designed for NanoTrasen Naval Command officers. Gold decorative elements are applied to the sides, emphasizing the wearer's status. Heavy, reliable, and very expensive...
  components:
  - type: Sprite
    sprite: _Erida/Clothing/Head/Hardsuits/nanotrasen_navy_captain.rsi
  - type: Clothing
    sprite: _Erida/Clothing/Head/Hardsuits/nanotrasen_navy_captain.rsi
  - type: PointLight
    color: "#00FFFF"
    radius: 7
    energy: 1
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9

