        !type:String
        inteq-base
  - type: PdaBorderColor
    borderColor: "#c56c00"
  - type: Icon
    sprite: _Erida/Objects/Devices/pda.rsi
    state: inteq-base
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - NotekeeperCartridge
      - NanoTaskCartridge
      - AstroNavCartridge

