- type: entityTable
  id: BasicLightAntagEventsTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: ClosetSkeleton
    - id: KingRatMigration
    - id: ParadoxCloneSpawn
    - id: RevenantSpawn
    - id: SleeperAgents
    - id: DerelictGenericCyborgSpawn

- type: entity
  parent: BaseGameRule
  id: NightmareSpawn
  components:
  - type: StationEvent
    weight: 5
    earliestStart: 30
    reoccurrenceDelay: 20
    minimumPlayers: 20
    duration: null
  - type: AntagRandomSpawn
  - type: AntagSpawner
    prototype: MobNightmare
  - type: AntagSelection
    agentName: nightmare-round-end-agent-name
    definitions:
    - spawnerPrototype: SpawnPointGhostNightmare
      min: 1
      max: 1
      pickPlayer: false
      mindRoles:
      - MindRoleGhostRoleSoloAntagonist
  - type: DynamicRuleCost
    cost: 60
  - type: AntagObjectives
    objectives:
    - NightmareSurviveObjective
    - NightmareLightDestroyObjective
