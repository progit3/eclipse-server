- type: entity
  categories: [ HideSpawnMenu ]
  parent: ClothingBackpackAshLegion
  id: ClothingBackpackAshLegionSizoLeaderFilled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        tableId: AshLegionSizoLeaderEntityTable

- type: entityTable
  id: AshLegionSizoLeaderEntityTable
  table: !type:AllSelector
    children:
    - id: BoxSurvival
    - id: BoxFlare
      prob: 0.50
    - id: CombatMedipen
      prob: 0.50
    - id: RubberStampAshLegion

- type: entity
  categories: [ HideSpawnMenu ]
  parent: ClothingBackpackAshLegion
  id: ClothingBackpackAshLegionSizoFilled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:NestedSelector
        tableId: AshLegionSizoEntityTable

- type: entityTable
  id: AshLegionSizoEntityTable
  table: !type:AllSelector
    children:
    - id: BoxSurvival
    - id: BoxFlare
      prob: 0.50
    - id: CombatMedipen
      prob: 0.50
    - !type:NestedSelector
      rolls: !type:RangeNumberSelector
        range: 0, 0
      tableId: PlasmaSwordTypeEntityTable

- type: entityTable
  id: PlasmaSwordTypeEntityTable
  table: !type:GroupSelector
    children:
    - id: PlasmaSword
    - id: PlasmaSwordAlt
