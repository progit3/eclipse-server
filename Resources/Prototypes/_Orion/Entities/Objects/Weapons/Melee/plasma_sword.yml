- type: entity
  parent: [ BaseMajorContraband, BaseMeleeWeaponEnergy ]
  id: BaseMeleeWeaponPlasma
  abstract: true
  components:
  - type: ItemToggle
    soundActivate:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_on.wav
      params:
        volume: 3
    soundDeactivate:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_off.wav
      params:
        volume: 3
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_hit.wav
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_swing.wav
      params:
        variation: 0.125
  - type: Welder
    fuelSolutionName: plasma
    fuelReagent: Plasma
    fuelLitCost: 1.5
  - type: RefillableSolution
    solution: plasma
  - type: SolutionContainerManager
    solutions:
      plasma:
        reagents:
        - ReagentId: Plasma
          Quantity: 500
        maxVol: 500
  - type: SolutionRegeneration
    solution: plasma
    generated:
      reagents:
      - ReagentId: Plasma
        Quantity: 0.005

- type: entity
  parent: BaseMeleeWeaponPlasma
  id: PlasmaSword
  name: plasma sword
  description: Blade is made of pure plasma heated from two to nine thousand degrees at the request of the owner. Power module made in the form of a handle heats up the gas and maintains its shape with a strong magnetic field. It seems that such blades have not been produced since the discovery of lightsabers.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword.rsi
    layers:
    - state: icon
    - state: icon-on
      color: "#FFFFFF"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword-inhands.rsi

- type: entity
  parent: PlasmaSword
  id: PlasmaSwordAlt
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword_alt.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword_alt-inhands.rsi

- type: entity
  parent: [ BaseMeleeWeaponPlasma, EnergySwordDouble ]
  id: PlasmaScythe
  name: plasma scythe
  description: This can be stored in pockets.
  components:
  - type: Sprite
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword_double.rsi
  - type: Item
    sprite: _Orion/Objects/Weapons/Melee/plasma_sword_double-inhands.rsi
  - type: MeleeWeapon
    wideAnimationRotation: 45
  - type: SolutionContainerManager
    solutions:
      plasma:
        reagents:
        - ReagentId: Plasma
          Quantity: 800
        maxVol: 800
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_hit.wav
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/_Orion/Weapons/Melee/plasma/plasma_swing.wav
      params:
        variation: 0.125
        volume: -10
    activatedDamage:
      types:
        Slash: 22
        Heat: 22
        Structural: 30

# Borgs

- type: entity
  parent: PlasmaSwordAlt
  id: CyborgPlasmaSwordAlt
  suffix: For Borgs
  description: A very loud & dangerous sword with a beam made of pure, concentrated plasma. Specially designed for legion cyborgs.

- type: entity
  parent: PlasmaScythe
  id: CyborgPlasmaScythe # я теку от этого спрайта
  suffix: For Borgs
  description: Legion Command Interns thought that having one blade on the energy sword was not enough. Specially designed for legion cyborgs.
  components: # could add energy-draining like the L6C
  - type: Wieldable
    freeHandsRequired: 0 # because borg has no off-hand to wield with.  Without this, it will be unable to activate the esword
