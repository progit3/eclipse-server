- type: entity
  parent: LockerBaseSecure
  id: LockerAshLegionVanguard
  name: AshLegion vanguard locker
  components:
  - type: Sprite
    netsync: false
    sprite: _Orion/Structures/Storage/inteq.rsi
    noRot: true
    layers:
    - state: ashlegion
      map: ["enum.StorageVisualLayers.Base"]
    - state: vanguard_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: EntityStorageVisuals
    stateBaseClosed: ashlegion
    stateDoorOpen: open
    stateDoorClosed: vanguard_door
  - type: AccessReader
    access: [["AshLegionVanguardLeader"], ["AshLegionVanguard"]]

- type: entity
